name: Fix gateway port list

on:
  push:
    paths:
      - .github/workflows/fix-gateway-port-list.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Unbekannte serielle Ports ausblenden
        shell: python
        run: |
          from pathlib import Path

          path = Path("custom_components/eltako_sensors_actuators/config_flow.py")
          text = path.read_text(encoding="utf-8")

          old_hint = '    return "Gateway automatisch erkennen"\n'
          new_hint = '    return "ELTAKO Gateway"\n'
          if old_hint not in text:
              raise SystemExit("Fallback label not found")
          text = text.replace(old_hint, new_hint, 1)

          old_block = '''        if _is_noise_serial_port(device, description, hwid):
              continue

          grouped.setdefault(_dedupe_group_key(port), []).append(port)
          '''
          new_block = '''        if _is_noise_serial_port(device, description, hwid):
              continue

          # Only show serial ports that can be identified as an ELTAKO/EnOcean
          # gateway. Other serial devices remain accessible through manual entry.
          if _infer_connection_kind(device, description, hwid) == CONNECTION_KIND_UNKNOWN:
              continue

          grouped.setdefault(_dedupe_group_key(port), []).append(port)
          '''
          if old_block not in text:
              raise SystemExit("Serial port filter block not found")
          text = text.replace(old_block, new_block, 1)

          path.write_text(text, encoding="utf-8")

      - name: Syntax pruefen
        run: python -m py_compile custom_components/eltako_sensors_actuators/config_flow.py

      - name: Aenderung committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/eltako_sensors_actuators/config_flow.py
          git commit -m "Hide unknown serial ports from gateway selection"
          git push

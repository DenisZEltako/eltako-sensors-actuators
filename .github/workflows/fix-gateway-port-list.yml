name: Fix gateway port list

on:
  push:
    paths:
      - .github/workflows/fix-gateway-port-list.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Unbekannte serielle Ports ausblenden
        shell: python
        run: |
          from pathlib import Path

          path = Path("custom_components/eltako_sensors_actuators/config_flow.py")
          text = path.read_text(encoding="utf-8")

          text = text.replace(
              '    return "Gateway automatisch erkennen"',
              '    return "ELTAKO Gateway"',
              1,
          )

          filter_line = (
              "        if _infer_connection_kind(device, description, hwid) "
              "== CONNECTION_KIND_UNKNOWN:\n"
              "            continue\n\n"
          )
          marker = "        grouped.setdefault(_dedupe_group_key(port), []).append(port)\n"

          if filter_line not in text:
              if marker not in text:
                  raise SystemExit("Serial port insertion point not found")
              text = text.replace(marker, filter_line + marker, 1)

          path.write_text(text, encoding="utf-8")

      - name: Aenderung kontrollieren
        shell: python
        run: |
          from pathlib import Path

          text = Path("custom_components/eltako_sensors_actuators/config_flow.py").read_text(encoding="utf-8")
          assert 'return "Gateway automatisch erkennen"' not in text
          assert "== CONNECTION_KIND_UNKNOWN:" in text

      - name: Syntax pruefen
        run: python -m py_compile custom_components/eltako_sensors_actuators/config_flow.py

      - name: Aenderung committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/eltako_sensors_actuators/config_flow.py
          if git diff --cached --quiet; then
            echo "Keine weitere Aenderung notwendig."
            exit 0
          fi
          git commit -m "Hide unknown serial ports from gateway selection"
          git push
